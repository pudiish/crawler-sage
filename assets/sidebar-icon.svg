<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- hamster body -->
  <ellipse cx="12" cy="14" rx="7" ry="6"/>
  <!-- head -->
  <circle cx="12" cy="7" r="4.5"/>
  <!-- left ear -->
  <ellipse cx="8.5" cy="3.5" rx="1.8" ry="2.2"/>
  <!-- right ear -->
  <ellipse cx="15.5" cy="3.5" rx="1.8" ry="2.2"/>
  <!-- left eye -->
  <circle cx="10.2" cy="6.8" r="0.7" fill="currentColor" stroke="none"/>
  <!-- right eye -->
  <circle cx="13.8" cy="6.8" r="0.7" fill="currentColor" stroke="none"/>
  <!-- nose -->
  <circle cx="12" cy="8.2" r="0.5" fill="currentColor" stroke="none"/>
  <!-- left cheek -->
  <circle cx="8.5" cy="8" r="1.2" stroke-dasharray="1 1" opacity="0.5"/>
  <!-- right cheek -->
  <circle cx="15.5" cy="8" r="1.2" stroke-dasharray="1 1" opacity="0.5"/>
  <!-- whiskers left -->
  <line x1="6" y1="7.5" x2="9" y2="8" opacity="0.6"/>
  <line x1="6.2" y1="8.8" x2="9" y2="8.5" opacity="0.6"/>
  <!-- whiskers right -->
  <line x1="18" y1="7.5" x2="15" y2="8" opacity="0.6"/>
  <line x1="17.8" y1="8.8" x2="15" y2="8.5" opacity="0.6"/>
  <!-- paws -->
  <ellipse cx="8" cy="19" rx="1.5" ry="1"/>
  <ellipse cx="16" cy="19" rx="1.5" ry="1"/>
</svg>
